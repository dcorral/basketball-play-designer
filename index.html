<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playbook — Basketball Play Designer</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#101012">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ============ Home screen ============ -->
  <div id="home" class="home">
    <button id="helpHome" class="btn help-btn" title="Help">?</button>
    <select id="langHome" class="lang-select" title="Language / Idioma">
      <option value="en">🇬🇧</option>
      <option value="es">🇪🇸</option>
      <option value="it">🇮🇹</option>
      <option value="ru">🇷🇺</option>
      <option value="zh">🇨🇳</option>
      <option value="sr">🇷🇸</option>
      <option value="sl">🇸🇮</option>
      <option value="el">🇬🇷</option>
    </select>
    <div class="home-inner">
      <img src="assets/logo.png" alt="Cejudos" class="home-logo">
      <h1 id="homeTitle">Cejudo's Playbook</h1>
      <button id="createNewBtn" class="create-new">＋ CREATE NEW</button>
      <div class="backup-row">
        <button id="exportAllBtn" class="btn">⤓ Export all (.zip)</button>
        <button id="importAllBtn" class="btn">⤒ Import (.zip)</button>
      </div>
      <input id="playSearch" class="play-search" type="search" autocomplete="off" spellcheck="false" hidden>
      <div id="selectAllRow" class="select-all-row" hidden>
        <input type="checkbox" id="selectAllCheck" class="card-check">
        <label for="selectAllCheck" id="selectAllLabel"></label>
        <button id="deleteSelectedTop" class="card-del" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7 H20 M10 4 H14 M6.5 7 L7.5 20 H16.5 L17.5 7 M10 11 V16 M14 11 V16"/>
          </svg>
        </button>
      </div>
      <div id="playList" class="play-list"></div>
      <div id="noResults" class="no-results" hidden></div>
      <div id="pageRow" class="page-row" hidden>
        <button id="pagePrev" class="btn">‹</button>
        <span id="pageLabel"></span>
        <button id="pageNext" class="btn">›</button>
      </div>
      <button id="deleteSelectedBtn" class="btn btn-danger-solid" hidden></button>
      <button id="deleteAllBtn" class="delete-all" hidden></button>
    </div>
    <input id="importFile" type="file" accept=".zip,application/zip" hidden>
  </div>

  <!-- ============ Editor ============ -->
  <div id="editor" class="editor" hidden>
    <header class="topbar">
      <button id="backBtn" class="btn" title="Back to all plays">← Plays</button>
      <div class="name-wrap">
        <input id="playName" class="play-name" spellcheck="false" autocomplete="off">
      </div>
      <button id="exportBtn" class="btn icon-btn" title="Export as GIF, video or PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>
      <button id="shareBtn" class="btn icon-btn" title="Share play as a link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/>
          <path d="M8.4 10.9 L15.6 6.3 M8.4 13.1 L15.6 17.7"/>
        </svg>
      </button>
      <button id="viewEditBtn" class="btn btn-primary icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
        <span id="viewEditLabel">Edit</span>
      </button>
      <button id="helpEditor" class="btn help-btn" title="Help">?</button>
      <select id="langEditor" class="lang-select" title="Language / Idioma">
        <option value="en">🇬🇧</option>
        <option value="es">🇪🇸</option>
        <option value="it">🇮🇹</option>
        <option value="ru">🇷🇺</option>
        <option value="zh">🇨🇳</option>
        <option value="sr">🇷🇸</option>
        <option value="sl">🇸🇮</option>
        <option value="el">🇬🇷</option>
      </select>
    </header>

    <div class="step-actions">
      <button id="addStepBtn" class="step-chip step-add" title="Next step">＋</button>
      <button id="resetAllBtn" class="step-chip step-reset" title="Reset all">↺</button>
    </div>

    <div class="steps-row">
      <div id="stepChips" class="step-chips"></div>
    </div>

    <main class="stage-wrap">
      <div id="stage" class="stage">
        <!-- Court background -->
        <svg id="courtSvg" viewBox="-3.5 -6 57 62" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="woodOut" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#8a5a2b"/>
              <stop offset="1" stop-color="#7a4e24"/>
            </linearGradient>
            <linearGradient id="woodIn" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#c98d4b"/>
              <stop offset="1" stop-color="#b87c3c"/>
            </linearGradient>
            <pattern id="planks" width="4" height="62" patternUnits="userSpaceOnUse" x="-3.5" y="-6">
              <rect width="4" height="62" fill="none"/>
              <line x1="0" y1="0" x2="0" y2="62" stroke="rgba(0,0,0,0.07)" stroke-width="0.15"/>
            </pattern>
          </defs>

          <!-- out of bounds floor -->
          <rect x="-3.5" y="-6" width="57" height="62" fill="url(#woodOut)"/>
          <rect x="-3.5" y="-6" width="57" height="62" fill="url(#planks)"/>

          <!-- court floor -->
          <rect x="0" y="0" width="50" height="54" fill="url(#woodIn)"/>
          <rect x="0" y="0" width="50" height="54" fill="url(#planks)"/>

          <!-- team logo at centre court, in place of the centre circle
               (href injected at runtime) -->
          <image id="teamLogo" x="18.25" y="39.5" width="13.5" height="15" opacity="0.92"
                 preserveAspectRatio="xMidYMid meet"/>

          <g stroke="#f6f0e8" stroke-width="0.35" fill="none" stroke-linecap="round">
            <!-- boundary -->
            <rect x="0" y="0" width="50" height="47"/>
            <!-- paint / key -->
            <rect x="17" y="0" width="16" height="19" fill="rgba(180,60,40,0.35)"/>
            <!-- free throw circle -->
            <circle cx="25" cy="19" r="6"/>
            <!-- restricted area -->
            <path d="M 21 5.25 A 4 4 0 0 0 29 5.25"/>
            <!-- 3pt line -->
            <path d="M 3 0 L 3 14.2 A 23.75 23.75 0 0 0 47 14.2 L 47 0"/>
            <!-- sidelines continuing into the other half -->
            <line x1="0" y1="47" x2="0" y2="54"/>
            <line x1="50" y1="47" x2="50" y2="54"/>
            <!-- backboard -->
            <line x1="22" y1="4" x2="28" y2="4" stroke-width="0.5"/>
          </g>
          <!-- rim -->
          <circle cx="25" cy="5.25" r="0.9" fill="none" stroke="#ff6b35" stroke-width="0.4"/>
        </svg>

        <!-- Arrows overlay -->
        <svg id="arrowsSvg" viewBox="-3.5 -6 57 62" preserveAspectRatio="xMidYMid meet">
          <defs>
            <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
            </marker>
          </defs>
          <g id="arrowsGroup"></g>
          <g id="previewGroup"></g>
        </svg>

        <!-- Player tokens go here -->
        <div id="tokens"></div>
        <!-- Arrow edit handles -->
        <div id="handles"></div>

      </div>

      <div class="zoom-ctrl">
        <button id="zoomOut" title="Zoom out">−</button>
        <button id="zoomLabel" title="Reset zoom">100%</button>
        <button id="zoomIn" title="Zoom in">＋</button>
      </div>
    </main>

    <!-- Floating tool bar -->
    <div id="toolbar" class="toolbar">
      <div id="toolGrip" class="tool-grip" title="Drag to move the toolbar (double-click to reset)">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <circle cx="9" cy="6" r="1.7"/><circle cx="15" cy="6" r="1.7"/>
          <circle cx="9" cy="12" r="1.7"/><circle cx="15" cy="12" r="1.7"/>
          <circle cx="9" cy="18" r="1.7"/><circle cx="15" cy="18" r="1.7"/>
        </svg>
      </div>
      <button class="tool active" data-tool="select" title="Select / move players (1) — only on step 1">
        <svg viewBox="0 0 24 24"><path d="M5 3 L19 11 L12.5 12.6 L9 20 Z" fill="currentColor" stroke="none"/></svg>
        <span class="knum">1</span>
      </button>
      <button class="tool" data-tool="arrow" title="Movement arrow — drag from a player to where they cut (2)">
        <svg viewBox="0 0 24 24"><path d="M4 12 H 18 M12 6 l 6 6 -6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="knum">2</span>
      </button>
      <button class="tool" data-tool="screen" title="Screen / block — drag from the screener to where they set it (3)">
        <svg viewBox="0 0 24 24"><path d="M4 12 H 16 M19 5 V 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="knum">3</span>
      </button>
      <button class="tool" data-tool="eraser" title="Eraser — click an arrow or a player to remove its arrow (4)">
        <svg viewBox="0 0 24 24"><path d="M14.5 4.5 l 5 5 L10 19 H6 v-4 z M5 20 h 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="knum">4</span>
      </button>
      <div class="tool-sep"></div>
      <button id="undoBtn" class="tool" disabled title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24"><path d="M8 5 L3 10 L8 15 M3 10 H14.5 a4.75 4.75 0 0 1 0 9.5 H10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="redoBtn" class="tool" disabled title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 24 24"><path d="M16 5 L21 10 L16 15 M21 10 H9.5 a4.75 4.75 0 0 0 0 9.5 H14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <footer class="player-bar">
      <button id="prevBtn" class="pbtn" title="Previous step">◀◀</button>
      <button id="playBtn" class="pbtn pbtn-main" title="Play / Pause">▶</button>
      <button id="nextBtn" class="pbtn" title="Next step">▶▶</button>
      <div class="timeline-wrap">
        <div id="timelineTicks" class="timeline-ticks"></div>
        <input type="range" id="scrubber" min="0" max="1000" value="0" step="1">
      </div>
      <div id="stepIndicator" class="step-indicator">Step 1 / 1</div>
      <select id="speedSelect" class="speed-select" title="Playback speed">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </footer>

    <div class="delete-row">
      <button id="deletePlayBtn" class="btn btn-danger-solid icon-btn" title="Delete current play">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7 H20 M10 4 H14 M6.5 7 L7.5 20 H16.5 L17.5 7 M10 11 V16 M14 11 V16"/>
        </svg>
        <span id="deletePlayLabel">Delete</span>
      </button>
    </div>
  </div>

  <!-- ============ Interactive tour ============ -->
  <div id="tour" hidden>
    <div class="tour-shade" id="tourShadeT"></div>
    <div class="tour-shade" id="tourShadeB"></div>
    <div class="tour-shade" id="tourShadeL"></div>
    <div class="tour-shade" id="tourShadeR"></div>
    <div class="tour-hole" id="tourHole"></div>
    <div class="tour-tip" id="tourTip">
      <p id="tourText"></p>
      <div class="tour-actions">
        <span id="tourCount" class="tour-count"></span>
        <button id="tourSkip" class="btn"></button>
        <button id="tourNext" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <!-- ============ Help ============ -->
  <div id="helpModal" class="modal-overlay" hidden>
    <div class="modal help-modal">
      <h2 id="helpTitle"></h2>
      <div id="helpContent" class="help-content"></div>
      <div class="modal-actions">
        <button id="helpClose" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- ============ Toast notification ============ -->
  <div id="toast" class="toast" hidden>
    <span id="toastMsg"></span>
    <button id="toastClose" title="Dismiss">✕</button>
  </div>

  <!-- ============ Modal ============ -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalMsg"></p>
      <label id="modalCheckWrap" class="modal-check" hidden>
        <input type="checkbox" id="modalCheck">
        <span id="modalCheckLabel"></span>
      </label>
      <input id="modalInput" type="text" autocomplete="off">
      <div class="modal-actions">
        <button id="modalCancel" class="btn">Cancel</button>
        <button id="modalOk" class="btn btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- ============ Export modal ============ -->
  <div id="exportModal" class="modal-overlay" hidden>
    <div class="modal">
      <h2 id="exportTitle">Export play</h2>
      <label class="field">
        <span id="exportFormatLabel">Format</span>
        <select id="exportFormat">
          <option value="gif">GIF animation</option>
          <option value="video">Video (MP4 / WebM)</option>
          <option value="pdf">PDF — all steps</option>
        </select>
      </label>
      <div id="exportTiming">
        <label class="field">
          <span id="exportMoveLabel">Movement duration (seconds)</span>
          <input id="exportMove" type="number" min="0.3" max="8" step="0.1" value="1.8">
        </label>
        <label class="field">
          <span id="exportPauseLabel">Pause between steps (seconds)</span>
          <input id="exportPause" type="number" min="0" max="10" step="0.1" value="1">
        </label>
      </div>
      <p id="exportStatus" class="export-status" hidden></p>
      <div class="modal-actions">
        <button id="exportCancel" class="btn">Cancel</button>
        <button id="exportGo" class="btn btn-primary">Export</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="export.js"></script>
  <script src="backup.js"></script>

</body>
</html>
